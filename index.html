<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Car Dashboard</title>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
}

body {
  background: transparent;
  font-family: "Roboto", Arial, sans-serif;
  color: #111;
  display: flex;
  justify-content: center;
  align-items: center;
}

body.light {
  color: #000;
}

/* ===== Центральный контейнер ===== */
.dashboard {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* ===== Погода ===== */
.weather {
  font-size: 22px;
  opacity: 0.8;
}

/* ===== Скорость ===== */
.speed-wrapper {
  display: flex;
  align-items: flex-end;
}

.speed {
  font-size: 160px;
  font-weight: 700;
  line-height: 1;
}

.unit {
  font-size: 36px;
  margin-left: 12px;
  margin-bottom: 12px;
  opacity: 0.7;
}

/* ===== HUD ===== */
.hud {
  font-size: 20px;
  opacity: 0.85;
  text-align: center;
  max-width: 80vw;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="weather" id="weather">
    —
  </div>

  <div class="speed-wrapper">
    <div class="speed" id="speed">0</div>
    <div class="unit">km/h</div>
  </div>
  
  <div class="rpm-wrapper">
    <div class="rpm" id="rpm">0</div>
    <div class="unit">rpm</div>
  </div>

  <div class="hud" id="hud">
    —
  </div>
  
  <div class="theme" id="theme">
    —
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
