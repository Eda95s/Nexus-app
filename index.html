<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mining Engine</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyBXwMF9uRZWzXh3_1fPxY2SNsJCMmLhMFw",
        authDomain: "nexus-app-6769e.firebaseapp.com",
        databaseURL: "https://nexus-app-6769e-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "nexus-app-6769e",
        storageBucket: "nexus-app-6769e.firebasestorage.app",
        messagingSenderId: "104884767189",
        appId: "1:104884767189:web:5f171f7db3ff5a6751d55c",
        measurementId: "G-6CZV18W7KJ"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      let tonConnectUI;
      document.addEventListener("DOMContentLoaded", () => {
          tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
              manifestUrl: 'https://eda95s.github.io/Nexus-app/tonconnect-manifest.json'
          });
      });

      async function connectWallet() {
          try {
              await tonConnectUI.openModal();
          } catch (e) {
              console.error("Wallet error:", e);
          }
      }

      function handleDonate() {
          toggleModal('donate-modal');
      }

      function copyAndThanks() {
          const address = "0x77e596231a14dee635e42c62ce215a2a47ec2c74";
          navigator.clipboard.writeText(address).then(() => {
              toggleModal('donate-modal');
              
              if (window.Telegram.WebApp.HapticFeedback) {
                  window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
              }

              const msg = (localStorage.getItem('nx_lang') === 'RU') 
                ? 'Адрес скопирован! Спасибо за поддержку развития Nexus Mining Engine.' 
                : 'Address copied! Thank you for supporting Nexus Mining Engine development.';

              window.Telegram.WebApp.showPopup({
                  title: 'Nexus Protocol',
                  message: msg,
                  buttons: [{id: 'ok', type: 'default', text: 'OK'}]
              });
          });
      }
    </script>
    <style>
        #floating-donate {
            position: fixed; bottom: 85px; right: 15px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #26a17b 0%, #1d7e61 100%); 
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000;
            border: 2px solid #fff; cursor: pointer; color: white;
            text-align: center; line-height: 1;
        }
        #floating-donate span { font-size: 9px; font-weight: bold; }
        .qr-container { text-align: center; margin: 15px 0; }
        .qr-container img { border: 5px solid white; border-radius: 10px; width: 160px; }
        .address-box { 
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; 
            font-size: 0.6rem; word-break: break-all; border: 1px solid rgba(0,212,255,0.2); 
            margin-bottom: 15px; color: #00f2ff;
        }

        /* --- ВНЕДРЕНИЕ: Event Log Monitor --- */
        .event-monitor {
            position: absolute;
            bottom: 270px; /* Над UI барами */
            width: 85%;
            height: 60px;
            background: rgba(0, 212, 255, 0.03);
            border-left: 2px solid var(--cyan);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5px 10px;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, black 40%);
        }
        .log-entry {
            font-size: 0.65rem;
            color: var(--cyan);
            margin: 2px 0;
            animation: logSlide 0.3s ease-out forwards;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @keyframes logSlide {
            from { transform: translateX(-10px); opacity: 0; }
            to { transform: translateX(0); opacity: 0.8; }
        }

        /* --- ВНЕДРЕНИЕ: Chat Interface Styles --- */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px; border-left: 3px solid var(--cyan); }
        .chat-msg .author { font-size: 0.6rem; color: var(--gold); font-weight: bold; display: block; }
        .chat-msg .text { font-size: 0.75rem; color: #fff; }
        .chat-input-area { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nexus-input { background: rgba(0,0,0,0.3); border: 1px solid var(--cyan); border-radius: 8px; color: #fff; padding: 10px; flex-grow: 1; font-family: 'Orbitron'; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="vignette" class="vignette-effect"></div>

    <div id="floating-donate" onclick="handleDonate()">
        <span id="floating-donate-text">USDT<br>DONATE</span>
    </div>

    <div class="metal-background">
        <div class="top-controls">
            <div class="control-btn" onclick="toggleModal('rank-modal')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </div>
            
            <div class="control-btn" onclick="connectWallet()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path>
                    <path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path>
                    <path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4-h-4z"></path>
                </svg>
            </div>

            <div class="control-btn" onclick="toggleModal('settings-modal')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>

        <div class="header-section">
            <div id="user-name" style="color: #00f2ff; font-weight: bold; margin-bottom: 5px;">Загрузка...</div>
            <div id="rank-badge" class="rank-label">RANK: ROOKIE</div>
            <div id="balance-value">0</div>
            <div id="protocol-text" class="protocol-status">NEX</div>
        </div>

        <div class="click-area" id="touch-zone">
            <div class="nexus-button" id="coin-visual">
                <span class="nexus-symbol">N</span>
            </div>
        </div>

        <div id="event-log-container" class="event-monitor">
            </div>

        <div class="bottom-ui">
            <div class="stat-row">
                <div class="label-with-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
                    <span id="lbl-energy">ENERGY</span>
                </div>
                <div class="bar-bg"><div id="energy-fill" class="fill-orange"></div></div>
            </div>
            <div class="stat-row">
                <div class="label-with-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                    <span id="lbl-sync">OVERDRIVE</span>
                </div>
                <div class="bar-bg"><div id="boost-fill" class="fill-cyan"></div></div>
            </div>
            <div id="od-btn" class="sync-btn" onclick="activateOverdrive()">LOADING 0%</div>
        </div>

        <div id="donate-modal" class="modal-overlay">
            <div class="modal-content">
                <h2 id="m-donate-title" style="color: #26a17b; font-size: 1.2rem;">DEPOSIT USDT</h2>
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=0x77e596231a14dee635e42c62ce215a2a47ec2c74" alt="QR">
                </div>
                <p id="m-donate-desc" style="font-size: 0.7rem; color: #aaa; margin-bottom: 10px;">SUPPORT PROJECT DEVELOPMENT</p>
                <p style="font-size: 0.7rem; color: #888;">Network: <span style="color: #fff;">BSC (BEP20)</span></p>
                <div class="address-box">0x77e596231a14dee635e42c62ce215a2a47ec2c74</div>
                <button id="copy-addr-btn" class="nexus-btn-small" style="width: 100%; margin-bottom: 10px;" onclick="copyAndThanks()">COPY ADDRESS</button>
                <button class="close-btn-nexus" onclick="toggleModal('donate-modal')">CLOSE</button>
            </div>
        </div>

        <div id="rank-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2 id="m-rank-title">TOP MINERS</h2>
                <div class="rank-list" id="leaderboard-list"></div>
                <button class="close-btn-nexus" onclick="toggleModal('rank-modal')">CLOSE</button>
            </div>
        </div>
        <div id="market-modal" class="modal-overlay"><div class="modal-content full-modal"><h2 id="m-market-title">MARKET</h2><div class="item-grid" id="market-grid"></div> <button class="close-btn-nexus" onclick="toggleModal('market-modal')">CLOSE</button></div></div>
        <div id="tasks-modal" class="modal-overlay"><div class="modal-content full-modal"><h2 id="m-tasks-title">TASKS</h2><div class="item-grid" id="tasks-grid"></div> <button class="close-btn-nexus" onclick="toggleModal('tasks-modal')">CLOSE</button></div></div>
        
        <div id="chat-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2 id="m-chat-title">GLOBAL CHAT</h2>
                <div class="chat-container">
                    <div id="online-status" style="color: #00ff88; font-size: 10px; font-weight: bold; text-align: center; margin-bottom: 5px;">ONLINE: 0</div>

                    <div id="chat-messages" class="chat-messages">
                        </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="nexus-input" placeholder="Enter message...">
                        <button class="nexus-btn-small" onclick="sendMessage()">SEND</button>
                    </div>
                </div>
                <button class="close-btn-nexus" onclick="toggleModal('chat-modal')">CLOSE</button>
            </div>
        </div>

        <div id="settings-modal" class="modal-overlay"><div class="modal-content"><h2 id="m-sys-title">SYSTEM</h2><div class="setting-row"><span id="lbl-lang">LANGUAGE</span><button class="nexus-btn-small" id="lang-btn" onclick="changeLanguage()">EN</button></div><div class="setting-row"><span id="lbl-haptic">VIBRATION</span><button class="nexus-btn-small" id="haptic-btn" onclick="toggleHaptic()">ON</button></div><button class="close-btn-nexus" onclick="toggleModal('settings-modal')">CLOSE</button></div></div>

        <nav class="nav-bar">
            <div class="nav-item active" id="nav-mining" onclick="location.reload()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21H23L12 2Z"/></svg>
                <span>MINING</span>
            </div>
            <div class="nav-item" id="nav-chat" onclick="toggleModal('chat-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                <span id="nav-chat-label">CHAT</span>
            </div>
            <div class="nav-item" id="nav-market" onclick="toggleModal('market-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18C5.9 18 5 18.9 5 20C5 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L21.16 4.96L19.42 4H19.41L18.31 6L15.55 11H8.53L4.27 2H1Z"/></svg>
                <span>MARKET</span>
            </div>
            <div class="nav-item" id="nav-tasks" onclick="toggleModal('tasks-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/></svg>
                <span>TASKS</span>
            </div>
        </nav>
    </div>

    <script src="script.js?v=100.0"></script>
</body>
</html>
