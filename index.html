<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Mining Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="vignette" class="vignette-effect"></div>
    <div class="metal-background">
        <div class="user-info-bar" style="position: absolute; top: 15px; left: 20px; font-size: 0.7rem; color: var(--cyan); z-index: 100;">
            <span id="user-name">LOADING...</span> | ID: <span id="user-id">0000</span>
        </div>

        <div class="top-controls">
            <div class="control-btn" onclick="openRanks()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </div>
            <div class="control-btn" onclick="toggleModal('settings-modal')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>

        <div class="header-section">
            <div id="rank-badge" class="rank-label">NEWBIE</div>
            <div id="balance-value">0</div>
            <div class="protocol-subtext">NEXUS PROTOCOL ACTIVE</div>
        </div>

        <div class="click-area" id="touch-zone">
            <div class="nexus-button" id="coin-visual"><span class="nexus-symbol">N</span></div>
        </div>

        <div class="bottom-ui">
            <div class="stat-row">
                <div class="label-with-icon"><span id="lbl-energy">ENERGY</span></div>
                <div class="bar-bg"><div id="energy-fill" class="fill-orange"></div></div>
            </div>
            <div class="stat-row">
                <div class="label-with-icon"><span id="lbl-sync">OVERDRIVE</span></div>
                <div class="bar-bg"><div id="boost-fill" class="fill-cyan"></div></div>
            </div>
            <div id="od-btn" class="sync-btn" onclick="activateOverdrive()">LOADING 0%</div>
        </div>

        <div id="rank-modal" class="modal-overlay"><div class="modal-content full-modal"><h2 id="m-rank-title">TOP MINERS</h2><div id="rank-list-container"></div><button class="close-btn-nexus" onclick="toggleModal('rank-modal')">CLOSE</button></div></div>
        <div id="market-modal" class="modal-overlay"><div class="modal-content full-modal"><h2 id="m-market-title">MARKET</h2><div id="market-grid"></div><button class="close-btn-nexus" onclick="toggleModal('market-modal')">CLOSE</button></div></div>
        <div id="tasks-modal" class="modal-overlay"><div class="modal-content full-modal"><h2 id="m-tasks-title">TASKS</h2><div id="tasks-grid"></div><button class="close-btn-nexus" onclick="toggleModal('tasks-modal')">CLOSE</button></div></div>
        <div id="settings-modal" class="modal-overlay"><div class="modal-content"><h2 id="m-sys-title">SYSTEM</h2><div class="setting-row"><span id="lbl-lang">LANG</span><button class="nexus-btn-small" id="lang-btn" onclick="changeLanguage()">EN</button></div><button class="close-btn-nexus" onclick="toggleModal('settings-modal')">CLOSE</button></div></div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="location.reload()"><span>MINING</span></div>
            <div class="nav-item" onclick="toggleModal('market-modal')"><span>MARKET</span></div>
            <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>TASKS</span></div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
