<body>
    <div id="vignette" class="vignette-effect"></div>

    <div class="metal-background">
        <div class="top-controls">
            <div class="control-btn" onclick="openRanks()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </div>
            <div class="control-btn" onclick="toggleModal('settings-modal')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>

        <div class="header-section">
    <div id="user-name" style="color: #00f2ff; font-weight: bold; margin-bottom: 5px;">Загрузка...</div>
    
    <div id="rank-badge" class="rank-label">RANK: ROOKIE</div>
    <div id="balance-value">0</div>
    <div id="protocol-text" class="protocol-status">NEX</div>
</div>

        <div class="click-area" id="touch-zone">
            <div class="nexus-button" id="coin-visual">
                <span class="nexus-symbol">N</span>
            </div>
        </div>

        <div class="bottom-ui">
            <div class="stat-row">
                <div class="label-with-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
                    <span id="lbl-energy">ENERGY</span>
                </div>
                <div class="bar-bg"><div id="energy-fill" class="fill-orange"></div></div>
            </div>
            <div class="stat-row">
                <div class="label-with-icon">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                    <span id="lbl-sync">OVERDRIVE</span>
                </div>
                <div class="bar-bg"><div id="boost-fill" class="fill-cyan"></div></div>
            </div>
            <div id="od-btn" class="sync-btn" onclick="activateOverdrive()">LOADING 0%</div>
        </div>

        <div id="rank-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2 id="m-rank-title">TOP MINERS</h2>
                <div class="rank-list" id="rank-list-container"></div>
                <button class="close-btn-nexus" onclick="toggleModal('rank-modal')">CLOSE</button>
            </div>
        </div>

        <div id="market-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2 id="m-market-title">MARKET</h2>
                <div class="item-grid" id="market-grid">
                    </div>
                <button class="close-btn-nexus" onclick="toggleModal('market-modal')">CLOSE</button>
            </div>
        </div>

        <div id="tasks-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2 id="m-tasks-title">TASKS</h2>
                <div class="item-grid" id="tasks-grid">
                    </div>
                <button class="close-btn-nexus" onclick="toggleModal('tasks-modal')">CLOSE</button>
            </div>
        </div>

        <div id="settings-modal" class="modal-overlay">
            <div class="modal-content">
                <h2 id="m-sys-title">SYSTEM</h2>
                <div class="setting-row">
                    <span id="lbl-lang">LANGUAGE</span>
                    <button class="nexus-btn-small" id="lang-btn" onclick="changeLanguage()">EN</button>
                </div>
                <div class="setting-row">
                    <span id="lbl-haptic">VIBRATION</span>
                    <button class="nexus-btn-small" id="haptic-btn" onclick="toggleHaptic()">ON</button>
                </div>
                <button class="close-btn-nexus" onclick="toggleModal('settings-modal')">CLOSE</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" id="nav-mining" onclick="location.reload()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21H23L12 2Z"/></svg>
                <span>MINING</span>
            </div>
            <div class="nav-item" id="nav-market" onclick="toggleModal('market-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18C5.9 18 5 18.9 5 20C5 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L21.16 4.96L19.42 4H19.41L18.31 6L15.55 11H8.53L4.27 2H1Z"/></svg>
                <span>MARKET</span>
            </div>
            <div class="nav-item" id="nav-tasks" onclick="toggleModal('tasks-modal')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/></svg>
                <span>TASKS</span>
            </div>
        </nav>
    </div>
    <script src="script.js?v=1.1"></script>
</body>
</html>
