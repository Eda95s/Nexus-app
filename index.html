<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mining Engine</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    <style>
        /* Вынес стили сюда, чтобы код был чистым */
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; }
        #floating-donate {
            position: fixed; bottom: 80px; right: 15px; width: 50px; height: 50px; 
            background: rgba(38, 161, 123, 0.9); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; border: 2px solid #fff; cursor: pointer;
        }
        .control-btn { width: 40px; height: 40px; background: #333; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; }
        .top-controls { display: flex; gap: 10px; padding: 15px; }
    </style>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Твой конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBXwMF9uRZWzXh3_1fPxY2SNsJCmMLhMFY",
            authDomain: "nexus-app-6769e.firebaseapp.com",
            databaseURL: "https://nexus-app-6769e-default-rtdb.firebaseio.com",
            projectId: "nexus-app-6769e",
            storageBucket: "nexus-app-6769e.appspot.com",
            messagingSenderId: "104884767189",
            appId: "1:104884767189:web:5f171fdb3ff5a67890" // Убедись, что тут полный ID
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Настройка TonConnect (БЕЗ buttonRootId!)
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://eda95s.github.io/Nexus-app/tonconnect-manifest.json'
        });

        async function connectWallet() {
            try {
                await tonConnectUI.openModal();
            } catch (error) {
                console.error("Ошибка кошелька:", error);
            }
        }

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                tg.showAlert("✅ Кошелек привязан!");
            }
        });

        function showDonation() {
            tg.openLink("https://t.me/tвой_канал");
        }
    </script>
</head>
<body>

    <div id="floating-donate" onclick="showDonation()">
        <span style="font-weight: bold; font-size: 12px;">USDT</span>
    </div>

    <div class="metal-background">
        <div class="top-controls">
            <div class="control-btn" onclick="connectWallet()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="3" y="4" width="18" height="16" rx="2"/>
                    <path d="M16 12h4"/>
                </svg>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 50px;">
            <h1>Nexus Engine</h1>
            <p>Система загружена</p>
        </div>
    </div>

</body>
</html>
