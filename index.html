<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
    <div class="metal-background">
        <div class="balance-container">
            <span id="balance-value">0</span>
        </div>

        <div class="energy-bar-wrap">
            <div class="bar-bg"><div id="energy-fill" class="bar-fill"></div></div>
        </div>

        <div class="coin-container" id="touch-zone">
            <img src="logo.png" id="coin-visual">
        </div>

        <div id="market-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2>MARKET</h2>
                <div id="market-grid"></div>
                <button class="close-btn-nexus" onclick="toggleModal('market-modal')">CLOSE</button>
            </div>
        </div>

        <div id="tasks-modal" class="modal-overlay">
            <div class="modal-content full-modal">
                <h2>TASKS</h2>
                <div id="tasks-grid"></div>
                <button class="close-btn-nexus" onclick="toggleModal('tasks-modal')">CLOSE</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div onclick="location.reload()">MINE</div>
            <div onclick="toggleModal('market-modal')">MARKET</div>
            <div onclick="toggleModal('tasks-modal')">TASKS</div>
        </nav>
    </div>
    <script src="script.js?v=99.9"></script>
</body>
</html>
